name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Extract default mode
        run: bun run bin/cli.js extract-metadata examples/v1/metadata.json /tmp/default --mode default

      - name: Extract serdes mode
        run: bun run bin/cli.js extract-metadata examples/v1/metadata.json /tmp/serdes --mode serdes

      - name: Diff default
        run: diff -r examples/v1/default /tmp/default

      - name: Diff serdes
        run: diff -r examples/v1/serdes /tmp/serdes
